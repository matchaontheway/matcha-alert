name: Matcha Restock Check

on:
  schedule:
    - cron: "*/10 * * * *"   # 每 10 分鐘自動檢查（UTC；偶爾延遲幾分鐘屬正常）
  repository_dispatch:        # 外部叫醒（cron-job.org 會打這個電話進來）
    types: [wake-up]
  workflow_dispatch:          # 手動執行；可選擇模式
    inputs:
      mode:
        description: "執行模式（test = 馬上傳一則測試訊息）"
        type: choice
        default: "normal"
        options:
          - normal
          - test

permissions:
  contents: write

concurrency:
  group: matcha-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "test" ]; then
            python check_stock.py test
          else
            python check_stock.py
          fi

      - name: Commit state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update stock state [skip ci]"
            git push
          else
            echo "state.json 無變化"
          fi
